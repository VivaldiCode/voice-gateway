# Voice Gateway — CI pipeline.
#
# I7 + I10 (round 12): runs the full quality matrix on every PR. The
# triggers are scoped to `pull_request` ONLY (not `push`) so:
#   - branches in development don't burn Actions minutes on every commit
#   - merging a PR doesn't re-run CI on `main` (the PR run is the
#     gating one)
#   - release builds get their own workflow (see release.yml) keyed to
#     tags or manual dispatch
#
# Jobs:
#   1. lint-and-typecheck       — fast feedback: tsc + (future) lint
#   2. vitest                    — unit + integration on Node 20 and 22
#   3. pytest                    — bridge tests (Linux only)
#   4. e2e-packaged              — Playwright against the packaged macOS
#                                  .app, headless (VG_E2E_HEADLESS=1)
#
# Coverage badges + uploads are intentionally out of scope for now;
# coverage lives in `coverage/` after vitest --coverage and PR comments
# can be wired up later.

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  # Manual dispatch for poking the pipeline ad-hoc without opening a PR.
  workflow_dispatch:

# A new push to a PR cancels the previous run for that PR — saves minutes
# when devs push quickly + keeps the latest commit's result as the gate.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + typecheck (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck

  vitest:
    name: Vitest (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Run vitest with coverage
        run: npx vitest run --coverage
      - name: Upload coverage artifact
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-vitest
          path: coverage/
          retention-days: 14

  pytest:
    name: Pytest — hermes-voice-bridge
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install bridge with dev extras
        working-directory: server/hermes-voice-bridge
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        working-directory: server/hermes-voice-bridge
        run: pytest -q

  e2e-packaged:
    name: Playwright E2E (packaged .app, headless)
    runs-on: macos-latest
    timeout-minutes: 60
    # Real-mic + Piper specs are skipped in CI (need user-granted mic +
    # voice models) so we only run the fast, mock-bridge-only specs by
    # using grep -v.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Build packaged .app
        run: npm run build:mac
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright (headless, skip mic-dependent specs)
        env:
          VG_E2E_HEADLESS: '1'
        run: |
          # Skip every spec that needs real microphone access — Playwright's
          # `--grep-invert` matches against spec file names + test titles,
          # so we name the actual specs. The four below all rely on
          # --use-fake-device-for-media-stream OR a granted-mic permission
          # the headless runner doesn't have.
          npx playwright test \
            --ignore-snapshots \
            --reporter=list \
            --grep-invert='audio-conversation|mic-capture|wake-word|settings-audio'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
