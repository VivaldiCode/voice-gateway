# Voice Gateway — CI pipeline.
#
# I7 + I10 (round 12): runs the full quality matrix on every PR. The
# triggers are scoped to `pull_request` ONLY (not `push`) so:
#   - branches in development don't burn Actions minutes on every commit
#   - merging a PR doesn't re-run CI on `main` (the PR run is the
#     gating one)
#   - release builds get their own workflow (see release.yml) keyed to
#     tags or manual dispatch
#
# Jobs:
#   1. lint-and-typecheck       — fast feedback: tsc + lint
#   2. vitest                    — unit + integration on Node 20 and 22
#   3. pytest                    — bridge tests (Linux only)
#   4. e2e-packaged              — Playwright against the packaged macOS
#                                  .app, headless (VG_E2E_HEADLESS=1)
#   5. dependency-review         — issue #22: blocks PRs introducing
#                                  vulnerable deps at high+ severity
#
# Issue #22: every GitHub Action is pinned to its commit SHA (not a
# floating tag) so a compromised tag re-point can't silently swap
# behaviour during a CI run. Dependabot's `github-actions` ecosystem
# (see .github/dependabot.yml) opens PRs weekly to bump these SHAs as
# the upstream actions ship new patch/minor releases.

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  # Manual dispatch for poking the pipeline ad-hoc without opening a PR.
  workflow_dispatch:

# A new push to a PR cancels the previous run for that PR — saves minutes
# when devs push quickly + keeps the latest commit's result as the gate.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + typecheck (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint

  vitest:
    name: Vitest (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install
        run: npm ci
      # Issue #22: surface known npm vulns + verify provenance.
      # Both are ADVISORY for now (|| true): the current dependency tree
      # has 17 known vulns (mostly transitive in electron-builder) that
      # we need to triage before flipping these to gating. Hardening
      # follow-up tracked once Dependabot has had a chance to bump the
      # transitives. The advisory mode keeps the report visible in CI
      # logs without blocking unrelated PRs.
      - name: npm audit (advisory)
        run: npm audit --audit-level=high || true
      - name: npm audit signatures (advisory)
        run: npm audit signatures || true
      - name: Run vitest with coverage
        run: npx vitest run --coverage
      - name: Upload coverage artifact
        if: matrix.node == '22'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-vitest
          path: coverage/
          retention-days: 14

  pytest:
    name: Pytest — hermes-voice-bridge
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip
      - name: Install bridge with dev extras
        working-directory: server/hermes-voice-bridge
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Issue #22: pip-audit flags vulnerable Python deps.
      # Advisory for now: the bridge itself isn't on PyPI so pip-audit
      # in editable mode can't resolve it ("Dependency not found on
      # PyPI"). We audit the resolved environment, ignore the local
      # package, and let the report surface in logs without blocking.
      # Hardening + a proper requirements.txt to audit against is a
      # follow-up tracked alongside the npm-audit gating bump.
      - name: Install pip-audit
        run: pip install pip-audit
      - name: pip-audit (advisory)
        working-directory: server/hermes-voice-bridge
        run: pip-audit --ignore-vuln "hermes-voice-bridge" || true
      - name: Run pytest
        working-directory: server/hermes-voice-bridge
        run: pytest -q

  # Issue #22: catches PRs that introduce new transitive deps with
  # known high-severity vulns. Runs only on pull_request AND only when
  # the repo opts in via the `VG_DEP_REVIEW_ENABLED` repo variable.
  #
  # The action requires the repository's "Dependency graph" setting
  # to be enabled (Settings → Code security → Dependency graph). Until
  # a maintainer flips that toggle, the action errors with "Dependency
  # review is not supported on this repository" — which the rollup
  # reports as FAILURE and trips the "all CI green" merge gate. Gating
  # the job behind a repo variable lets us land the workflow definition
  # now and turn it on later without churning the workflow file.
  #
  # To enable: GitHub repo → Settings → Secrets and variables → Actions
  #            → Variables → New repository variable → name
  #            `VG_DEP_REVIEW_ENABLED`, value `true`.
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request' && vars.VG_DEP_REVIEW_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Block PRs introducing CVSS ≥ 7.0 deps. Lower severities
          # surface as comments without blocking.
          fail-on-severity: high
          # Don't allow new GPL / AGPL / SSPL deps without explicit
          # review — they conflict with our distribution model.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, SSPL-1.0

  e2e-packaged:
    name: Playwright E2E (packaged .app, headless)
    runs-on: macos-latest
    timeout-minutes: 60
    # Real-mic + Piper specs are skipped in CI (need user-granted mic +
    # voice models) so we only run the fast, mock-bridge-only specs by
    # using grep -v.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Build packaged .app
        run: npm run build:mac
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright (headless, skip mic-dependent specs)
        env:
          VG_E2E_HEADLESS: '1'
        run: |
          # Skip every spec that needs real microphone access — Playwright's
          # `--grep-invert` matches against spec file names + test titles,
          # so we name the actual specs. The four below all rely on
          # --use-fake-device-for-media-stream OR a granted-mic permission
          # the headless runner doesn't have.
          npx playwright test \
            --ignore-snapshots \
            --reporter=list \
            --grep-invert='audio-conversation|mic-capture|wake-word|settings-audio'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
