# Voice Gateway — CI pipeline.
#
# I7 + I10 (round 12): runs the full quality matrix on every PR. The
# triggers are scoped to `pull_request` ONLY (not `push`) so:
#   - branches in development don't burn Actions minutes on every commit
#   - merging a PR doesn't re-run CI on `main` (the PR run is the
#     gating one)
#   - release builds get their own workflow (see release.yml) keyed to
#     tags or manual dispatch
#
# Jobs:
#   1. lint-and-typecheck       — fast feedback: tsc + lint
#   2. vitest                    — unit + integration on Node 20 and 22
#   3. pytest                    — bridge tests (Linux only)
#   4. e2e-packaged              — Playwright against the packaged macOS
#                                  .app, headless (VG_E2E_HEADLESS=1)
#   5. dependency-review         — issue #22: blocks PRs introducing
#                                  vulnerable deps at high+ severity
#
# Issue #22: every GitHub Action is pinned to its commit SHA (not a
# floating tag) so a compromised tag re-point can't silently swap
# behaviour during a CI run. Dependabot's `github-actions` ecosystem
# (see .github/dependabot.yml) opens PRs weekly to bump these SHAs as
# the upstream actions ship new patch/minor releases.

name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  # Manual dispatch for poking the pipeline ad-hoc without opening a PR.
  workflow_dispatch:

# A new push to a PR cancels the previous run for that PR — saves minutes
# when devs push quickly + keeps the latest commit's result as the gate.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint + typecheck (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint

  vitest:
    name: Vitest (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install
        run: npm ci
      # Issue #22: surface known npm vulns + verify provenance.
      # audit-level=high matches Dependency Review's threshold.
      # `audit signatures` is advisory (|| true) for now — the broader
      # npm ecosystem hasn't fully adopted provenance, so a hard fail
      # would block on third-party deps we don't control. Flip to a
      # hard fail in a follow-up once coverage is dense enough.
      - name: npm audit (high)
        run: npm audit --audit-level=high
      - name: npm audit signatures (advisory)
        run: npm audit signatures || true
      - name: Run vitest with coverage
        run: npx vitest run --coverage
      - name: Upload coverage artifact
        if: matrix.node == '22'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-vitest
          path: coverage/
          retention-days: 14

  pytest:
    name: Pytest — hermes-voice-bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install bridge with dev extras
        working-directory: server/hermes-voice-bridge
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # Issue #22: pip-audit flags vulnerable Python deps. Strict mode
      # fails on any audit-tooling error (not just findings) so we
      # notice when the audit itself breaks.
      - name: Install pip-audit
        run: pip install pip-audit
      - name: pip-audit (strict)
        working-directory: server/hermes-voice-bridge
        run: pip-audit --strict
      - name: Run pytest
        working-directory: server/hermes-voice-bridge
        run: pytest -q

  # Issue #22: catches PRs that introduce new transitive deps with
  # known high-severity vulns. Runs only on pull_request because the
  # action needs a base + head to diff against.
  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          # Block PRs introducing CVSS ≥ 7.0 deps. Lower severities
          # surface as comments without blocking.
          fail-on-severity: high
          # Don't allow new GPL / AGPL / SSPL deps without explicit
          # review — they conflict with our distribution model.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, SSPL-1.0

  e2e-packaged:
    name: Playwright E2E (packaged .app, headless)
    runs-on: macos-latest
    timeout-minutes: 30
    # Real-mic + Piper specs are skipped in CI (need user-granted mic +
    # voice models) so we only run the fast, mock-bridge-only specs by
    # using grep -v.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
      - name: Install
        run: npm ci
      - name: Build packaged .app
        run: npm run build:mac
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright (headless, skip mic-dependent specs)
        env:
          VG_E2E_HEADLESS: '1'
        run: |
          # Skip every spec that needs real microphone access — Playwright's
          # `--grep-invert` matches against spec file names + test titles,
          # so we name the actual specs. The four below all rely on
          # --use-fake-device-for-media-stream OR a granted-mic permission
          # the headless runner doesn't have.
          npx playwright test \
            --ignore-snapshots \
            --reporter=list \
            --grep-invert='audio-conversation|mic-capture|wake-word|settings-audio'
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
