# Dependabot — issue #22.
#
# Catches vulnerable transitive dependencies + keeps the supply chain
# fresh across our three ecosystems:
#
#   - npm        — top-level package.json + lockfile (renderer + main + preload)
#   - pip        — server/hermes-voice-bridge/pyproject.toml
#   - github-actions — every workflow in .github/workflows/, including
#                      SHA-pinned actions so we get PRs to bump pins as
#                      new minor/patch SHAs ship
#
# All ecosystems use weekly cadence — fast enough to surface CVEs within
# 7 days, slow enough to not drown the maintainer in PRs. Security
# updates always come through immediately regardless of schedule.
#
# Non-security minor + patch updates are grouped per ecosystem so we
# get one consolidated PR per week instead of N separate ones. Major
# version bumps come ungrouped so each gets the review attention they
# need (likely breaking).

version: 2
updates:
  # ── npm (top-level Electron app) ────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '04:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'npm'
    groups:
      # All non-major updates roll up into one PR per week.
      npm-non-major:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
      # Security updates ALWAYS land regardless of group settings.
      # They're a separate channel; this entry just labels them.
      npm-security:
        applies-to: security-updates
        patterns:
          - '*'
    # Skip major-version PRs on packages that are pinned by design
    # pending coordinated upgrade work. Security advisories ALWAYS
    # override `ignore` so CVE bumps still arrive. (Issue #47.)
    #
    # Each block points at the tracking issue that will eventually
    # unblock the major bump. When that tracking issue closes, remove
    # the matching ignore entry here so Dependabot can resume offering
    # the major.
    ignore:
      # Electron + electron-builder — coordinated under #45 (Vite 8 +
      # Electron 39 + plugin-react 6). Electron majors ship behaviour
      # changes (e.g. session API tweaks, autoUpdater cert rotation)
      # that need code changes elsewhere.
      - dependency-name: 'electron'
        update-types: ['version-update:semver-major']
      - dependency-name: 'electron-builder'
        update-types: ['version-update:semver-major']
      # Vite + plugin-react — coordinated under #45. plugin-react v6
      # requires Vite 8, and Vite 8 cascades through electron-vite,
      # vitest, and our `vite.config.ts`. Previously closed PRs: #39, #43.
      - dependency-name: 'vite'
        update-types: ['version-update:semver-major']
      - dependency-name: '@vitejs/plugin-react'
        update-types: ['version-update:semver-major']
      # React + types — coordinated under #46 (React 19 migration).
      # react-dom v19 requires react v19 AND @types/react v19. Previously
      # closed PR: #42.
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react-dom'
        update-types: ['version-update:semver-major']
      # ESLint + ecosystem — eslint v9 requires the flat-config migration
      # (eslint.config.js). eslint-plugin-react-hooks v7 requires React 19
      # AND eslint flat config. Previously closed PRs: #40 (react-hooks),
      # #41 (eslint). When we migrate ESLint config, open a dedicated
      # tracking issue and remove these.
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint-plugin-react-hooks'
        update-types: ['version-update:semver-major']

  # ── pip (hermes-voice-bridge) ───────────────────────────────────────
  - package-ecosystem: 'pip'
    directory: '/server/hermes-voice-bridge'
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '04:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'python'
    groups:
      pip-non-major:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'

  # ── github-actions (workflow SHA pins) ──────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'sunday'
      time: '04:00'
      timezone: 'Etc/UTC'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'github-actions'
    groups:
      # Roll all action SHA bumps into one PR per week. Major bumps
      # still come individually because they sometimes change input
      # contracts (e.g. setup-node@v3 → v4 dropped Node 14).
      gh-actions-non-major:
        applies-to: version-updates
        update-types:
          - 'minor'
          - 'patch'
