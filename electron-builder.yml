appId: dev.voicegateway.app
productName: Voice Gateway
copyright: Copyright © 2026 Voice Gateway contributors
asar: false
afterPack: build/after-pack.cjs
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/python
    to: python
    filter:
      - "**/*"
      # Don't ship pytest scaffolding into the .app — it's only used by `npm
      # test`. The matchers stay in wake_phrase.py at the root, which is what
      # the runtime actually imports.
      - "!tests/**"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
  - from: resources/piper
    to: piper
    filter:
      - "**/*"
  - from: resources/scripts
    to: scripts
    filter:
      - "**/*.sh"
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.svg
    to: icon.svg
  - from: resources/icons
    to: icons
    filter:
      - "icon-*.png"
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  # Ad-hoc sign (identity: false → '-'). Gives the bundle a stable code
  # signature across rebuilds so macOS treats every rebuild as the same
  # app — critical for the microphone permission cache, which is keyed by
  # the designated requirement. With `identity: null` the bundle stays
  # unsigned and each rebuild looks like a new app, so granted permissions
  # silently evaporate.
  identity: false
  icon: resources/icon.icns
  # macOS refuses to surface a permission prompt for the microphone without
  # NSMicrophoneUsageDescription in Info.plist; without it, getUserMedia
  # rejects silently with AbortError. The com.apple.security.device.audio-input
  # entitlement is the hardened-runtime counterpart of the same permission.
  extendInfo:
    NSMicrophoneUsageDescription: A Voice Gateway precisa do microfone para gravar o que dizes ao Hermes.
    NSCameraUsageDescription: A Voice Gateway não usa a câmara; esta entrada existe só para compatibilidade.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
  category: AudioVideo
  icon: resources/icon.png
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
