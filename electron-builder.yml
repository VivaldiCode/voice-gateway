appId: dev.voicegateway.app
productName: Voice Gateway
copyright: Copyright © 2026 Voice Gateway contributors
asar: false
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/python
    to: python
    filter:
      - "**/*"
  - from: resources/piper
    to: piper
    filter:
      - "**/*"
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null
  icon: resources/icon.png
linux:
  target:
    - AppImage
  category: AudioVideo
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
