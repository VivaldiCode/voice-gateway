appId: dev.voicegateway.app
productName: Voice Gateway
copyright: Copyright © 2026 Voice Gateway contributors
asar: false
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/python
    to: python
    filter:
      - "**/*"
  - from: resources/piper
    to: piper
    filter:
      - "**/*"
  - from: resources/scripts
    to: scripts
    filter:
      - "**/*.sh"
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.svg
    to: icon.svg
  - from: resources/icons
    to: icons
    filter:
      - "icon-*.png"
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null
  icon: resources/icon.icns
  # macOS refuses to surface a permission prompt for the microphone without
  # NSMicrophoneUsageDescription in Info.plist; without it, getUserMedia
  # rejects silently with AbortError. The com.apple.security.device.audio-input
  # entitlement is the hardened-runtime counterpart of the same permission.
  extendInfo:
    NSMicrophoneUsageDescription: A Voice Gateway precisa do microfone para gravar o que dizes ao Hermes.
    NSCameraUsageDescription: A Voice Gateway não usa a câmara; esta entrada existe só para compatibilidade.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
linux:
  target:
    - AppImage
  category: AudioVideo
  icon: resources/icon.png
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
