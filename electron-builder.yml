appId: dev.voicegateway.app
productName: Voice Gateway
copyright: Copyright © 2026 Voice Gateway contributors
asar: false
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
extraResources:
  - from: resources/python
    to: python
    filter:
      - "**/*"
  - from: resources/piper
    to: piper
    filter:
      - "**/*"
  - from: resources/scripts
    to: scripts
    filter:
      - "**/*.sh"
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.svg
    to: icon.svg
  - from: resources/icons
    to: icons
    filter:
      - "icon-*.png"
mac:
  category: public.app-category.utilities
  target:
    - target: dmg
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: null
  icon: resources/icon.icns
linux:
  target:
    - AppImage
  category: AudioVideo
  icon: resources/icon.png
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
